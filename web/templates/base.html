<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Анонимайзер</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary-color: #64748b;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --background-color: #f8fafc;
      --card-background: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
    }
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background-color: var(--background-color);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .navbar {
      background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%) !important;
      box-shadow: var(--shadow-md);
      padding: 0.75rem 0;
    }
    
    .navbar-brand {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
    }
    
    .nav-link {
      font-weight: 500;
      padding: 0.5rem 1rem !important;
      border-radius: var(--radius-sm);
      transition: background-color 0.2s ease;
    }
    
    .nav-link:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    .card {
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s ease;
    }
    
    .card:hover {
      box-shadow: var(--shadow-md);
    }
    
    .card-header {
      background: transparent;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      color: var(--text-primary);
      padding: 1rem 1.25rem;
    }
    
    .card-body {
      padding: 1.25rem;
    }
    
    .btn {
      font-weight: 500;
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }
    
    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    .btn-outline-secondary {
      color: var(--secondary-color);
      border-color: var(--border-color);
    }
    
    .btn-outline-secondary:hover {
      background-color: var(--background-color);
      border-color: var(--secondary-color);
      color: var(--text-primary);
    }
    
    .form-control, .form-select {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.625rem 0.875rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    .form-control:focus, .form-select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    
    .form-label {
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    
    .form-text {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    .alert {
      border: none;
      border-radius: var(--radius-md);
      font-weight: 500;
    }
    
    .badge {
      font-weight: 500;
      padding: 0.35rem 0.65rem;
      border-radius: var(--radius-sm);
    }
    
    .list-group-item {
      border: 1px solid var(--border-color);
      padding: 0.875rem 1rem;
      transition: background-color 0.15s ease;
    }
    
    .list-group-item:hover {
      background-color: var(--background-color);
    }
    
    .text-muted {
      color: var(--text-secondary) !important;
    }
    
    /* Smooth transitions */
    * {
      transition-property: background-color, border-color, color, fill, stroke;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 150ms;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'core:landing' %}">
      <span>🔒</span> Анонимайзер
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto gap-1">
        {% if user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="{% url 'core:profile' %}">👤 {{ user.username }}</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'core:anonymize' %}">📝 Анонимизация</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">🚪 Выход</a></li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Вход</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Регистрация</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  {% if messages %}
    <div class="mb-4">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:"info" }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
