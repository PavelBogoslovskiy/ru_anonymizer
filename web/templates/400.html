<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>400 - Некорректный запрос</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-card {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    .error-icon { font-size: 5rem; margin-bottom: 1rem; }
    .error-code { font-size: 4rem; font-weight: 700; color: #f59e0b; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">😕</div>
    <div class="error-code">400</div>
    <h2 class="mb-3">Некорректный запрос</h2>
    <p class="text-muted mb-4">
      Сервер не смог обработать ваш запрос. Пожалуйста, проверьте данные и попробуйте снова.
    </p>
    <a href="/" class="btn btn-primary btn-lg px-5">🏠 На главную</a>
  </div>
</body>
</html>
