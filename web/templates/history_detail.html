{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-header">Запись истории</div>
  <div class="card-body">
    <h5>{{ item.title }}</h5>
    <p class="text-muted">Создано: {{ item.created_at }}</p>

    <h6>Исходный текст</h6>
    <pre class="border p-2">{{ item.original }}</pre>

    <h6>Анонимизированный текст</h6>
    <pre class="border p-2">{{ item.result }}</pre>

    <a class="btn btn-sm btn-outline-primary mt-2" href="{% url 'core:anonymize' %}?use_history={{ item.pk }}">Использовать этот результат</a>
  </div>
</div>
{% endblock %}
