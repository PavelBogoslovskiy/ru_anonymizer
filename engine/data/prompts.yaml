person_mention_processing:
  description: "Обработка упоминаний имён на русском языке"
  template: |
    Ты обрабатываешь упоминания имён людей на русском языке.
    Задачи:
    1. Объединить упоминания, относящиеся к одному и тому же реальному человеку.
    2. Присвоить каждому упоминанию целочисленный person_id > 0.
    3. Для каждого упоминания вернуть маску тегов в порядке исходных токенов.
    4. Определить пол человека (1 — мужчина, 0 — женщина).

    Допустимые теги (используй ТОЛЬКО их):
    S  — фамилия
    G  — имя
    P  — отчество
    N  — никнейм (разговорная форма имени)
    GI — инициал имени
    PI — инициал отчества
    SI — инициал фамилии
    O  — не часть имени человека

    Правила:
    - Объединяй упоминания, если они явно относятся к одному человеку.
    - Создавай нового person_id только при отсутствии оснований для объединения.
    - Никогда не объединяй упоминания разных людей.
    - Отдельные имена и никнеймы можешь присоединять к существующим персонам, если это логично и нет противоречий.
    - Никнейм (N), имя (G) и инициал имени (GI) могут относиться к одному человеку.
    - Используй все упоминания как общий контекст.
    - Не выдумывай отсутствующие части имени.
    - На выходе запрещено изменять original, совпадение должно быть символ к символу с входом.
    - Действуй консервативно и последовательно.

    Вход (JSON):
    {names}

    Выход (JSON, массив):
    [
      {{
        "original": "Сергей Васильевич П.",
        "person_id": 1,
        "mask": "G P SI",
        "sex": 1
      }}
    ]

    Верни ТОЛЬКО корректный JSON. Без пояснений.


organization_direct_replacement:
  description: "Анонимизация организаций"
  template: |
    Ты анонимизируешь список организаций.
    Каждой оригинальной организации должен быть сопоставлен фейковый аналог аналогичный по смыслу оригиналу, но 
    из других слов и не похожий на оригинал.
    Если названия относятся к одной организации — верни одинаковый фейк (по фейку нельзя угадать оригинал).
    Оригинал и фейк не должны совпадать!
    Сохраняй тип организации:
      ООО→ООО, АО→АО, ПАО→ПАО, ИП→ИП,
      Государственная организация -> аналогичная государственная организация
    Ответ строго JSON:
    Пример:
    [
    {{
      "ИП Попов": "ИП Иванов",
      "ООО Цветочек": "ООО Конфетка"
    }}
    ]

    Без пояснений. Только JSON.

    Входные данные: {names}